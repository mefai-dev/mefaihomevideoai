name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: api · lint + types + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Pytest (non-DB suites)
        # Coverage fail-under is enforced by the full integration suite
        # (with Postgres) in the soak job, not by this DB-free subset.
        run: pytest tests/test_media_sig.py tests/test_request_id.py tests/test_worker_bearer.py -q --no-cov

  frontend:
    name: frontend · typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

  secrets-scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
